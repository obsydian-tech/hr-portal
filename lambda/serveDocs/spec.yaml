openapi: "3.0.3"

info:
  title: Naleko HR Portal API
  version: "1.0.0"
  contact:
    name: Naleko Engineering
  description: |
    REST API powering the Naleko employee-onboarding HR Portal.

    Two API Gateways deployed in af-south-1 (Cape Town):

    | Gateway | API ID | Handles |
    |---|---|---|
    | Employees | ndksa9ec0k | Employee records, Swagger UI, OpenAPI spec |
    | Documents | b2wt303fc8 | Document upload, OCR verifications, AI risk assessment |

    Authentication: all endpoints require a Cognito ID token unless marked public.
    Authorization: Bearer <id_token>
    Identity and role are derived from JWT claims only (sub + cognito:groups). No custom headers.

    Roles:
    - hr-partners: create employees, review docs, assess risk for their employees
    - hr-managers: same plus full visibility across all employees and verifications

    POPIA: all data stays in af-south-1. No PII leaves South Africa.
    Bedrock AI calls use cross-region inference profiles via AWS infrastructure only.

    Interactive docs: GET https://ndksa9ec0k.execute-api.af-south-1.amazonaws.com/docs

servers:
  - url: https://ndksa9ec0k.execute-api.af-south-1.amazonaws.com
    description: Employees API
  - url: https://b2wt303fc8.execute-api.af-south-1.amazonaws.com
    description: Documents and Verifications API

tags:
  - name: Employees
    description: Create and manage employee records
  - name: Documents
    description: Upload documents and generate pre-signed S3 URLs
  - name: Verifications
    description: OCR results, HR review workflow, and AI risk assessment
  - name: Docs
    description: Swagger UI and raw OpenAPI spec (no auth required)

components:
  securitySchemes:
    CognitoJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito User Pool ID token from InitiateAuth / RespondToAuthChallenge.

  schemas:

    EmployeeCreate:
      type: object
      required: [first_name, last_name, email, phone, department]
      description: Fields required to register a new employee.
      properties:
        first_name:
          type: string
          example: Sarah
        middle_name:
          type: string
        last_name:
          type: string
          example: Dlamini
        email:
          type: string
          format: email
          example: sarah.dlamini@example.com
        phone:
          type: string
          example: "+27821234567"
        department:
          type: string
          example: Finance
        job_title:
          type: string
          example: Senior Accountant
        offer_accept_date:
          type: string
          format: date
          example: "2026-04-01"
        planned_start_date:
          type: string
          format: date
          example: "2026-05-01"
        hr_staff_id:
          type: string
          example: HR-00042
        hr_staff_name:
          type: string
          example: Thabo Mokoena
        hr_staff_email:
          type: string
          format: email
          example: thabo@naleko.co.za

    Employee:
      type: object
      description: Full employee record.
      properties:
        employee_id:
          type: string
          example: EMP-0000014
        first_name:
          type: string
        middle_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        department:
          type: string
        job_title:
          type: string
        stage:
          type: string
          enum: [INVITED, DOCUMENTS_SUBMITTED, MANUAL_REVIEW, VERIFIED]
          description: Onboarding stage. Advances automatically when all documents are verified.
        offer_accept_date:
          type: string
          format: date
        planned_start_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          description: Cognito sub of the HR staff member who registered this employee.
        hr_staff_id:
          type: string
        hr_staff_name:
          type: string
        hr_staff_email:
          type: string
          format: email
        riskBand:
          type: string
          enum: [LOW, MEDIUM, HIGH, UNKNOWN]
          nullable: true
          description: AI-assessed onboarding risk. Null until assess-risk is called.
        riskReason:
          type: string
          nullable: true
          description: One-sentence explanation from the AI model for the risk band.
        riskAssessedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent risk assessment.

    Document:
      type: object
      description: A document uploaded by an employee during onboarding.
      properties:
        document_id:
          type: string
          example: doc_1774086521598
        document_type:
          type: string
          enum: [NATIONAL_ID, BANK_CONFIRMATION, QUALIFICATION]
        file_name:
          type: string
        uploaded_at:
          type: string
          format: date-time
        ocr_status:
          type: string
          enum: [PENDING, PASSED, MANUAL_REVIEW, FAILED]
          description: "PENDING: OCR in progress. PASSED: approved. MANUAL_REVIEW: awaiting HR. FAILED: rejected, employee must re-upload."
        ocr_completed_at:
          type: string
          format: date-time
          nullable: true
        can_reupload:
          type: boolean
          description: True when status is FAILED and the employee may submit a replacement.
        verification:
          $ref: "#/components/schemas/VerificationSummary"
          nullable: true

    VerificationSummary:
      type: object
      description: Condensed OCR result used in list views and embedded in Document records.
      properties:
        verification_id:
          type: string
          example: ver_1774086781234
        employee_id:
          type: string
          example: EMP-0000014
        employee_name:
          type: string
          example: Sarah Dlamini
        document_type:
          type: string
          enum: [NATIONAL_ID, BANK_CONFIRMATION, QUALIFICATION]
        document_id:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 100
          example: 95
          description: OCR confidence score as a percentage (0-100).
        decision:
          type: string
          enum: [PASSED, FAILED, MANUAL_REVIEW]
          description: "PASSED: accepted. FAILED: rejected. MANUAL_REVIEW: below confidence threshold, awaiting HR."
        created_at:
          type: string
          format: date-time

    VerificationDetail:
      allOf:
        - $ref: "#/components/schemas/VerificationSummary"
      description: Full verification record including OCR reasoning and extracted fields.
      properties:
        reasoning:
          type: string
          description: OCR model explanation for why the document passed, failed, or needs review.
        id_number:
          type: string
        name:
          type: string
        surname:
          type: string
        date_of_birth:
          type: string
          format: date
        gender:
          type: string
        citizenship:
          type: string
        account_holder:
          type: string
        bank_name:
          type: string
        account_number:
          type: string
        branch_code:
          type: string
        account_type:
          type: string
        institution:
          type: string
        qualification_name:
          type: string
        graduation_year:
          type: string

    ReviewRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [PASSED, FAILED]
          description: PASSED approves the document. FAILED rejects it and allows re-upload.
        notes:
          type: string
          example: ID number matches employee record.

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        missing:
          type: array
          items:
            type: string
          description: Required fields that were absent (400 responses only).

security:
  - CognitoJWT: []

paths:

  # =========================================================================
  # EMPLOYEES API  (ndksa9ec0k)
  # =========================================================================

  /v1/employees/lookup:
    get:
      tags: [Employees]
      operationId: lookupEmployeeEmail
      summary: Resolve an Employee ID to an email address
      description: |
        Public - no auth required.
        Used by the login screen so an employee can find their email before sign-in.
      security: []
      parameters:
        - name: employeeId
          in: query
          required: true
          schema:
            type: string
            example: EMP-0000014
      responses:
        "200":
          description: Email resolved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    format: email
        "400":
          description: Missing or malformed employee ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No employee found with that ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/employees:
    get:
      tags: [Employees]
      operationId: listEmployees
      summary: List employees visible to the calling HR staff member
      description: |
        Returns employees managed by the caller (scoped to their Cognito sub).
        Members of hr-managers see all employees regardless.
      parameters:
        - name: stage
          in: query
          required: false
          schema:
            type: string
            enum: [INVITED, DOCUMENTS_SUBMITTED, MANUAL_REVIEW, VERIFIED]
        - name: department
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: List of employee records.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Employee"
                  count:
                    type: integer
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags: [Employees]
      operationId: createEmployee
      summary: Register a new employee and trigger onboarding
      description: |
        Creates an employee record in DynamoDB, provisions a Cognito account with
        a temporary password, and sends a welcome email via Postmark.
        Employee created in INVITED stage. ID auto-generated as EMP-NNNNNNN.
        HR staff identity comes from the JWT sub claim.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeCreate"
      responses:
        "201":
          description: Employee created and welcome email sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Employee created successfully
                  employee:
                    $ref: "#/components/schemas/Employee"
                  cognito:
                    type: object
                    properties:
                      userCreated:
                        type: boolean
                      tempPassword:
                        type: string
                        nullable: true
                        description: Returned once at creation only. Not persisted - store securely.
                  email:
                    type: object
                    properties:
                      sent:
                        type: boolean
        "400":
          description: Missing required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/employees/by-email:
    get:
      tags: [Employees]
      operationId: getEmployeeByEmail
      summary: Look up an employee by email address
      description: Returns the full employee record for the given email address.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: Employee found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "400":
          description: Missing or invalid email.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No employee with that email.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # =========================================================================
  # DOCUMENTS AND VERIFICATIONS API  (b2wt303fc8)
  # =========================================================================

  /v1/employees/{id}/verifications:
    get:
      tags: [Verifications]
      operationId: getEmployeeDocumentVerifications
      summary: Get all documents and verifications for a specific employee
      description: |
        Returns the employee with their full document list. Each document includes
        its OCR verification result (if complete) and a can_reupload flag.
        Also returns a status count: { total, passed, manual_review, failed }.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: EMP-0000014
      responses:
        "200":
          description: Employee with documents and verifications.
          content:
            application/json:
              schema:
                type: object
                properties:
                  employee:
                    $ref: "#/components/schemas/Employee"
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Document"
                  summary:
                    type: object
                    properties:
                      total:
                        type: integer
                      passed:
                        type: integer
                      manual_review:
                        type: integer
                      failed:
                        type: integer
        "404":
          description: Employee not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/employees/{employee_id}/documents/upload-url:
    post:
      tags: [Documents]
      operationId: generateDocumentUploadUrl
      summary: Generate a pre-signed S3 URL for direct browser upload
      description: |
        Two-step upload flow:
        1. Call this endpoint to get a short-lived pre-signed S3 PUT URL.
        2. PUT the file directly from the browser (no Authorization header on S3).
        URL expires in 300 s. Accepted: image/jpeg, image/png, application/pdf.
        KMS-encrypted with alias/naleko-onboarding-pii.
        S3 triggers processDocumentOCR Lambda automatically after upload.
      parameters:
        - name: employee_id
          in: path
          required: true
          schema:
            type: string
            example: EMP-0000014
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documentType, contentType]
              properties:
                documentType:
                  type: string
                  enum: [NATIONAL_ID, BANK_CONFIRMATION, QUALIFICATION]
                contentType:
                  type: string
                  enum: [image/jpeg, image/png, application/pdf]
      responses:
        "200":
          description: Pre-signed URL ready.
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl:
                    type: string
                    format: uri
                    description: PUT the file body directly to this URL.
                  key:
                    type: string
                    description: S3 object key for later reference.
        "400":
          description: Unsupported content type or missing fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/employees/{id}/assess-risk:
    post:
      tags: [Verifications]
      operationId: assessOnboardingRisk
      summary: AI risk classification for an employee based on their document verifications
      description: |
        Sends a PII-free summary of all verification results to Claude (Bedrock).

        | Band | Meaning |
        |---|---|
        | LOW | All documents passed with high confidence |
        | MEDIUM | Some documents in manual review or low confidence |
        | HIGH | One or more documents failed or missing |

        Persists riskBand, riskReason, riskAssessedAt to the employee record.
        Requires at least one verification to exist for this employee.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: EMP-0000014
      responses:
        "200":
          description: Risk classified and saved to employee record.
          content:
            application/json:
              schema:
                type: object
                properties:
                  employeeId:
                    type: string
                  risk:
                    type: string
                    enum: [LOW, MEDIUM, HIGH, UNKNOWN]
                  reason:
                    type: string
                    example: All documents passed with high confidence. No anomalies detected.
        "404":
          description: No verifications found for this employee.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Bedrock or DynamoDB failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/documents/{id}/url:
    get:
      tags: [Documents]
      operationId: getDocumentPresignedUrl
      summary: Get a short-lived URL to preview or download a document
      description: |
        Returns a pre-signed S3 GET URL expiring in 15 minutes (900 s).
        Open in a browser to render the document inline. Used by the HR portal
        to display uploaded files without exposing S3 credentials.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: doc_1774086521598
      responses:
        "200":
          description: Pre-signed URL generated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                  file_name:
                    type: string
                  content_type:
                    type: string
                  expires_in:
                    type: integer
                    example: 900
                    description: Seconds until the URL expires.
        "404":
          description: Document not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/verifications:
    get:
      tags: [Verifications]
      operationId: listVerifications
      summary: List document verifications across employees
      description: |
        Returns OCR verification records enriched with employee names.
        HR partners see only verifications for employees they created.
        hr-managers see all verifications.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, PASSED, MANUAL_REVIEW, FAILED]
        - name: decision
          in: query
          required: false
          schema:
            type: string
            enum: [PASSED, FAILED, MANUAL_REVIEW]
        - name: employee_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: List of verification records.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/VerificationSummary"
                  count:
                    type: integer

  /v1/verifications/{id}:
    get:
      tags: [Verifications]
      operationId: getVerification
      summary: Get the full OCR verification result for a single document
      description: |
        Returns the complete record including OCR reasoning and all extracted fields.
        Fields by document type:
        - NATIONAL_ID: id_number, name, surname, date_of_birth, gender, citizenship
        - BANK_CONFIRMATION: account_holder, bank_name, account_number, branch_code, account_type
        - QUALIFICATION: institution, qualification_name, graduation_year
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: ver_1774086781234
      responses:
        "200":
          description: Full verification detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationDetail"
        "404":
          description: Verification not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/verifications/{id}/review:
    patch:
      tags: [Verifications]
      operationId: reviewVerification
      summary: HR officer approves or rejects a document in manual review
      description: |
        PASSED: approves the document (ocr_status set to PASSED).
        FAILED: rejects it (ocr_status set to FAILED, can_reupload set to true).
        Auto-promotion: if all documents are now PASSED, employee stage advances to VERIFIED.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRequest"
      responses:
        "200":
          description: Review recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  document_id:
                    type: string
                  employee_id:
                    type: string
                  decision:
                    type: string
                    enum: [PASSED, FAILED]
                  can_reupload:
                    type: boolean
                  all_documents_passed:
                    type: boolean
                  employee_stage_updated:
                    type: boolean
                    description: True if all docs passed and employee was promoted to VERIFIED.
        "400":
          description: Invalid decision value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Verification not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/verifications/{id}/summary:
    get:
      tags: [Verifications]
      operationId: getVerificationSummary
      summary: AI-generated plain-English summary of a verification result
      description: |
        Calls Claude (Bedrock) to produce a human-readable digest of the OCR result
        and extracted fields - no raw model output or technical field names.

        Designed for downstream consumers:
        - Employee rejection notifications (why was my document not accepted)
        - WhatsApp / chatbot channels
        - Future mobile app views

        No PII is sent to the model. Response time is typically 2-5 s.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: ver_1774086781234
      responses:
        "200":
          description: AI summary generated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  verificationId:
                    type: string
                  summary:
                    type: string
                    example: The document is a valid South African ID. All key fields extracted with high confidence.
        "404":
          description: Verification not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Bedrock invocation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/verifications/{id}/external:
    post:
      tags: [Verifications]
      operationId: triggerExternalVerification
      summary: Escalate a verification to an external verification provider
      description: |
        Sets status to EXTERNAL_VERIFICATION_TRIGGERED and publishes a
        VerificationExternalTriggered event to the naleko-onboarding EventBridge bus.
        Requires hr-partners group membership.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: External verification triggered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  verificationId:
                    type: string
                  status:
                    type: string
                    example: EXTERNAL_VERIFICATION_TRIGGERED
        "403":
          description: Caller is not in hr-partners group.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Verification is not in an actionable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # =========================================================================
  # DEVELOPER DOCS  (ndksa9ec0k - no auth)
  # =========================================================================

  /docs:
    get:
      tags: [Docs]
      operationId: getSwaggerUI
      summary: Swagger UI - interactive API documentation
      description: |
        Public - no auth required.
        Returns Swagger UI HTML pointed at GET /openapi.yaml on the same gateway.
      security: []
      responses:
        "200":
          description: Swagger UI HTML.
          content:
            text/html:
              schema:
                type: string

  /openapi.yaml:
    get:
      tags: [Docs]
      operationId: getOpenAPISpec
      summary: Raw OpenAPI 3.0 specification (YAML)
      description: |
        Public - no auth required.
        Returns the canonical spec consumed by Swagger UI and API client generators.
      security: []
      responses:
        "200":
          description: OpenAPI YAML.
          content:
            application/yaml:
              schema:
                type: string
