<app-sidebar
  [navItems]="navItems"
  [activeRoute]="'/hr/' + staffId()"
  actionLabel="New Hire"
  actionIcon="pi-plus"
  [(isOpen)]="sidebarOpen"
  (actionClicked)="openNewHireRegistration()"
  (logoutClicked)="onLogout()"
/>
<app-topbar
  title="HR Portal"
  [employeeName]="staffName()"
  [employeeRole]="staffRole()"
  [showSearch]="true"
  [showNotifications]="true"
  [notificationCount]="notificationCount()"
  [recentNotifications]="recentNotifications()"
  [notificationsRoute]="notificationsRoute()"
  (menuToggle)="toggleSidebar()"
  (notificationClick)="onNotificationClick($event)"
  (viewAllNotifications)="onViewAllNotifications()"
/>

<!-- AI Assistant toggle button -->
<div class="ai-mode-toggle-bar">
  <button
    type="button"
    class="ai-mode-toggle-btn"
    [class.ai-mode-toggle-btn--active]="aiMode.panelVisible()"
    (click)="aiMode.openPanel()"
    aria-label="Open AI Assistant">
    <span class="ai-mode-toggle-btn__dot"></span>
    <span>✦ AI Assistant</span>
  </button>
</div>

<!-- AI Assistant panel (p-drawer) -->
<app-ai-mode-panel />

<main class="dashboard">
  <div class="dashboard__content">
    <router-outlet />
  </div>
  <app-footer />
</main>
