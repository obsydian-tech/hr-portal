<p-toolbar styleClass="topbar">
  <ng-template #start>
    <div class="flex align-items-center gap-2">
      <!-- Hamburger menu (mobile only) -->
      <button class="topbar__hamburger" (click)="menuToggle.emit()">
        <i class="pi pi-bars"></i>
      </button>
      <span class="topbar__title">{{ title() }}</span>
    </div>
  </ng-template>
  <ng-template #center>
    @if (showSearch()) {
      <span class="topbar-search">
        <i class="pi pi-search topbar-search__icon"></i>
        <input
          pInputText
          type="text"
          placeholder="Search employees, documents..."
          class="topbar-search__input"
          disabled
        />
      </span>
    }
  </ng-template>
  <ng-template #end>
    <div class="flex align-items-center gap-3">
      @if (showNotifications()) {
        <button class="topbar__bell">
          <i class="pi pi-bell"></i>
          <span class="topbar__bell-dot"></span>
        </button>
      }
      <!-- Staff profile -->
      <div class="topbar__profile">
        <p-avatar
          [label]="initials"
          shape="circle"
          size="normal"
          [style]="{ 'background-color': '#4a3f8a', color: '#ffffff', 'font-weight': '700', 'font-size': '0.8rem' }"
        />
        <div class="topbar__profile-info">
          <span class="topbar__profile-name">{{ employeeName() }}</span>
          @if (employeeRole()) {
            <span class="topbar__profile-role">{{ employeeRole() }}</span>
          }
        </div>
      </div>
    </div>
  </ng-template>
</p-toolbar>
