<p-card styleClass="stepper-card">
  <div class="flex justify-content-between align-items-end mb-4">
    <div>
      <span class="stepper-card__label block mb-1">Onboarding Progress</span>
      <h2 class="text-xl font-bold m-0" style="color: var(--naleko-on-surface)">
        Stage {{ currentIndex() + 1 }} of {{ stepItems.length }}: {{ currentLabel() }}
      </h2>
    </div>
    <p-tag
      [value]="progressPercent() + '% Complete'"
      [rounded]="true"
      severity="info"
      styleClass="stepper-card__tag"
    />
  </div>

  <p-steps
    [model]="stepItems"
    [activeIndex]="currentIndex()"
    [readonly]="true"
    styleClass="stepper-steps"
  />
</p-card>
