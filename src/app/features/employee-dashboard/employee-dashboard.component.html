<app-sidebar [navItems]="navItems" [activeRoute]="'/employees/' + employeeId()" [(isOpen)]="sidebarOpen" />
<app-topbar
  title="Employee Portal"
  [employeeName]="employee().first_name + ' ' + employee().last_name"
  [showNotifications]="true"
  (menuToggle)="toggleSidebar()"
/>

<main class="dashboard">
  <div class="dashboard__content">
    <!-- Onboarding Stepper -->
    <app-onboarding-stepper [currentStage]="currentStage()" />

    <!-- Two-column grid: Highlights + Document Checklist -->
    <div class="grid">
      <div class="col-12 lg:col-4">
        <app-employee-highlights [employee]="employee()" hrPartner="Sandra Nkosi" />
      </div>
      <div class="col-12 lg:col-8">
        <app-document-checklist (allComplete)="onAllDocumentsComplete($event)" />
      </div>
    </div>
  </div>

  <!-- Footer -->
  <app-footer />
</main>
