# ---------------------------------------------------------------------------
# CI — Naleko HR Portal
# Runs on every PR and every push to main.
#
# Jobs:
#   1. frontend  — install → lint → build (prod) → unit tests
#   2. openapi   — validate api/openapi.yaml with swagger-parser
#   3. terraform — fmt check + validate on infra/
#
# Nothing is deployed; this workflow is gate-only.
# All AWS credentials are scoped read-only and injected via repository secrets.
# ---------------------------------------------------------------------------

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same branch to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  TF_VERSION: "1.10.5"

# ---------------------------------------------------------------------------
# Job 1 — Angular frontend
# ---------------------------------------------------------------------------
jobs:
  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hr-portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: hr-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      # TypeScript strict check + AOT compilation — catches template errors too
      - name: Build (production)
        run: npm run build -- --configuration production

      # Headless Chrome unit tests
      - name: Unit tests
        run: npm run test -- --no-watch --no-progress --browsers=ChromeHeadless

  # ---------------------------------------------------------------------------
  # Job 2 — OpenAPI spec lint
  # ---------------------------------------------------------------------------
  openapi:
    name: OpenAPI — validate spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # @redocly/cli validates $refs, required fields, type correctness
      - name: Validate api/openapi.yaml
        run: |
          npx --yes @redocly/cli lint api/openapi.yaml
          echo "✅ OpenAPI spec is valid"

  # ---------------------------------------------------------------------------
  # Job 3 — Terraform
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform — fmt & validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    # Only needs read access to S3 state; never applies
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: af-south-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Fails if any .tf file is not properly formatted
      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      # Downloads providers + validates config without hitting AWS
      - name: Terraform init
        run: |
          terraform init \
            -backend=false \
            -input=false

      - name: Terraform validate
        run: terraform validate

  # ---------------------------------------------------------------------------
  # Job 4 — Playwright E2E tests
  # Runs only when the repository variable E2E_ENABLED is set to 'true'.
  # Requires secrets: E2E_HR_EMAIL, E2E_HR_PASSWORD, E2E_EMP_EMAIL, E2E_EMP_PASSWORD.
  # Set E2E_BASE_URL to point to a staging environment, or leave unset to spin
  # up a local dev server (ng serve) against which the tests run.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E — Playwright journeys
    runs-on: ubuntu-latest
    if: vars.E2E_ENABLED == 'true'
    needs: [frontend]

    defaults:
      run:
        working-directory: hr-portal

    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL || '' }}
      E2E_HR_EMAIL: ${{ secrets.E2E_HR_EMAIL }}
      E2E_HR_PASSWORD: ${{ secrets.E2E_HR_PASSWORD }}
      E2E_EMP_EMAIL: ${{ secrets.E2E_EMP_EMAIL }}
      E2E_EMP_PASSWORD: ${{ secrets.E2E_EMP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: hr-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # If E2E_BASE_URL is not set, spin up local dev server on port 4200
      - name: Start dev server (local mode)
        if: ${{ !vars.E2E_BASE_URL }}
        run: |
          npx ng serve --host 0.0.0.0 --port 4200 &
          echo "Waiting for dev server to be ready..."
          npx wait-on http://localhost:4200 --timeout 120000

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: hr-portal/e2e/reports/
          retention-days: 14
